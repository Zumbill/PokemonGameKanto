<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Pokemon Game</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #182230;
        --muted: #667085;
        --line: #d6deea;
        --panel: #ffffff;
        --field: #f6f8fb;
        --accent: #d93c3c;
        --accent-dark: #a92f2f;
        --blue: #2c7be5;
        --green: #267a55;
        --yellow: #f2c94c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(217, 60, 60, 0.13), transparent 38%),
          linear-gradient(315deg, rgba(44, 123, 229, 0.12), transparent 40%),
          #f7f9fc;
      }

      main {
        width: min(980px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        gap: 22px;
        padding: 32px 0;
      }

      header {
        display: grid;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 8vw, 5rem);
        line-height: 0.95;
      }

      .subtitle,
      .status {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .game {
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
        gap: 22px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(33, 42, 62, 0.1);
      }

      .guess-panel {
        overflow: hidden;
      }

      .pokedex-top {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px;
        background: var(--accent);
        border-bottom: 5px solid var(--accent-dark);
      }

      .light {
        width: 28px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #67d1ff;
        border: 3px solid #fff;
        box-shadow: 0 0 0 2px rgba(24, 34, 48, 0.2);
      }

      .dot {
        width: 12px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--yellow);
      }

      .dot.green {
        background: var(--green);
      }

      form {
        display: grid;
        gap: 14px;
        padding: 24px;
      }

      label {
        font-size: 0.86rem;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--field);
        color: var(--ink);
        font: inherit;
      }

      input:focus {
        border-color: var(--blue);
        outline: 3px solid rgba(44, 123, 229, 0.18);
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .reset-button {
        margin-top: 14px;
        background: var(--green);
      }

      .reset-button:hover {
        background: #1d6042;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .mystery {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 18px;
        align-items: center;
        padding: 22px 24px 0;
      }

      .mystery.hide {
        display: none;
      }

      .mystery strong {
        display: block;
        font-size: 1.35rem;
      }

      .win {
        display: none;
        grid-template-columns: auto 1fr;
        gap: 18px;
        align-items: center;
        padding: 22px 24px 24px;
        border-top: 1px solid var(--line);
        background: #eef9f3;
      }

      .win.show {
        display: grid;
      }

      .win img {
        width: 108px;
        aspect-ratio: 1;
        object-fit: contain;
      }

      .mystery-mark {
        display: grid;
        place-items: center;
        width: 108px;
        aspect-ratio: 1;
        border: 4px solid var(--accent);
        border-radius: 50%;
        background: #fff;
        color: var(--accent);
        font-size: 4.5rem;
        font-weight: 900;
        line-height: 1;
      }

      .win strong {
        display: block;
        margin-bottom: 4px;
        font-size: 1.25rem;
        text-transform: capitalize;
      }

      .history {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .attempt {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--field);
        padding: 16px;
      }

      .attempt-header {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 12px;
      }

      .attempt-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .attempt-pokemon {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 10px;
      }

      .attempt-image {
        width: 44px;
        aspect-ratio: 1;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        object-fit: contain;
      }

      .attempt-name {
        min-width: 0;
        font-weight: 900;
        text-transform: capitalize;
        overflow-wrap: anywhere;
      }

      .attempt-id {
        flex: 0 0 auto;
        color: var(--muted);
        font-weight: 800;
      }

      .attempt-facts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .attempt-fact {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 9px 10px;
      }

      .attempt-fact span {
        display: block;
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 800;
        margin-bottom: 3px;
      }

      .attempt-fact strong {
        display: block;
        font-size: 0.92rem;
        text-transform: capitalize;
      }

      .hints {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .hint {
        border-radius: 8px;
        padding: 10px;
        background: #fff;
        border: 1px solid var(--line);
        font-size: 0.92rem;
      }

      .empty {
        margin: 0;
        color: var(--muted);
        padding: 22px;
        text-align: center;
      }

      @media (max-width: 760px) {
        main {
          align-content: start;
        }

        .game {
          grid-template-columns: 1fr;
        }

        .input-row,
        .hints,
        .attempt-facts {
          grid-template-columns: 1fr;
        }

        .win {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .mystery {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .win img,
        .mystery-mark {
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Pokemon Game</h1>
        <p class="subtitle">Adivinhe o Pokemon secreto da regiao de Kanto.</p>
        <p id="status" class="status">Preparando o jogo...</p>
      </header>

      <section class="game">
        <div class="panel guess-panel">
          <div class="pokedex-top">
            <span class="light"></span>
            <span class="dot"></span>
            <span class="dot green"></span>
          </div>

          <div id="mystery" class="mystery">
            <div class="mystery-mark" aria-hidden="true">?</div>
            <strong>Quem é esse Pokémon?</strong>
          </div>

          <form id="guess-form">
            <label for="guess-input">Seu chute</label>
            <div class="input-row">
              <input
                id="guess-input"
                name="nome"
                type="text"
                autocomplete="off"
                placeholder="ex: pikachu"
                required
              />
              <button id="guess-button" type="submit">Chutar</button>
            </div>
          </form>

          <div id="win" class="win">
            <img id="win-image" src="" alt="" />
            <div>
              <strong id="win-name"></strong>
              <span id="win-text"></span>
              <button id="reset-button" class="reset-button" type="button">
                Jogar novamente
              </button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div id="history" class="history">
            <p class="empty">Suas dicas vao aparecer aqui depois do primeiro chute.</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const elements = {
        form: document.querySelector("#guess-form"),
        input: document.querySelector("#guess-input"),
        button: document.querySelector("#guess-button"),
        status: document.querySelector("#status"),
        history: document.querySelector("#history"),
        mystery: document.querySelector("#mystery"),
        win: document.querySelector("#win"),
        winImage: document.querySelector("#win-image"),
        winName: document.querySelector("#win-name"),
        winText: document.querySelector("#win-text"),
        resetButton: document.querySelector("#reset-button"),
      };

      // Ativa ou desativa os campos enquanto uma requisicao esta acontecendo.
      function setLoading(isLoading) {
        elements.button.disabled = isLoading;
        elements.input.disabled = isLoading;
      }

      // Faz requisicoes para o backend e transforma a resposta em JSON.
      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.erro || "Algo deu errado.");
        }

        return data;
      }

      // Pede ao servidor para iniciar uma nova rodada do jogo.
      async function iniciarJogo() {
        setLoading(true);

        try {
          const data = await requestJson("/api/game/start", { method: "POST" });
          elements.status.textContent = data.mensagem;
          elements.input.focus();
        } catch (error) {
          elements.status.textContent = error.message;
        } finally {
          setLoading(false);
        }
      }

      // Limpa a tela e prepara a interface para uma nova rodada.
      async function resetarJogo() {
        elements.resetButton.disabled = true;
        elements.win.classList.remove("show");
        elements.mystery.classList.remove("hide");
        elements.history.innerHTML =
          '<p class="empty">Suas dicas vao aparecer aqui depois do primeiro chute.</p>';
        elements.input.value = "";
        elements.winImage.src = "";
        elements.winImage.alt = "";
        elements.winName.textContent = "";
        elements.winText.textContent = "";
        setLoading(false);
        await iniciarJogo();
        elements.resetButton.disabled = false;
      }

      // Monta o HTML de uma tentativa errada com dados do chute e dicas.
      function criarTentativa(data) {
        const tentativa = document.createElement("article");
        tentativa.className = "attempt";

        const header = document.createElement("div");
        header.className = "attempt-header";

        const titulo = document.createElement("div");
        titulo.className = "attempt-title";

        const pokemonInfo = document.createElement("div");
        pokemonInfo.className = "attempt-pokemon";

        const imagem = document.createElement("img");
        imagem.className = "attempt-image";
        imagem.src = data.chute.imagem;
        imagem.alt = data.chute.nome;

        const nome = document.createElement("span");
        nome.className = "attempt-name";
        nome.textContent = data.chute.nome;

        const id = document.createElement("span");
        id.className = "attempt-id";
        id.textContent = `#${String(data.chute.id).padStart(3, "0")}`;

        const fatos = document.createElement("div");
        fatos.className = "attempt-facts";

        const infos = [
          ["Altura", `${data.chute.altura / 10} m`],
          ["Peso", `${data.chute.peso / 10} kg`],
          ["Tipo(s)", data.chute.tipos.join(", ")],
        ];

        for (const [label, valor] of infos) {
          const fato = document.createElement("div");
          fato.className = "attempt-fact";

          const fatoLabel = document.createElement("span");
          fatoLabel.textContent = label;

          const fatoValor = document.createElement("strong");
          fatoValor.textContent = valor;

          fato.append(fatoLabel, fatoValor);
          fatos.append(fato);
        }

        const dicas = document.createElement("ul");
        dicas.className = "hints";

        for (const texto of data.dicas) {
          const dica = document.createElement("li");
          dica.className = "hint";
          dica.textContent = texto;
          dicas.append(dica);
        }

        pokemonInfo.append(imagem, nome);
        titulo.append(pokemonInfo, id);
        header.append(titulo, fatos);
        tentativa.append(header, dicas);
        return tentativa;
      }

      // Mostra o painel final quando o jogador acerta o Pokemon secreto.
      function mostrarVitoria(data) {
        elements.mystery.classList.add("hide");
        elements.winImage.src = data.pokemon.imagem;
        elements.winImage.alt = data.pokemon.nome;
        elements.winName.textContent = data.pokemon.nome;
        elements.winText.textContent = `${data.mensagem} Tentativas: ${data.tentativas}.`;
        elements.win.classList.add("show");
        elements.status.textContent = data.mensagem;
        elements.button.disabled = true;
        elements.input.disabled = true;
      }

      // Envia o chute do formulario, atualiza historico e trata erros.
      async function enviarChute(event) {
        event.preventDefault();
        const nome = elements.input.value.trim();

        if (!nome) {
          return;
        }

        setLoading(true);
        elements.status.textContent = "Consultando a PokeAPI...";

        try {
          const data = await requestJson("/api/game/guess", {
            method: "POST",
            body: JSON.stringify({ nome }),
          });

          if (data.ganhou) {
            mostrarVitoria(data);
            return;
          }

          elements.history.querySelector(".empty")?.remove();
          elements.history.prepend(criarTentativa(data));
          elements.status.textContent = `${data.mensagem} Tentativas: ${data.tentativas}.`;
          elements.input.value = "";
          elements.input.focus();
        } catch (error) {
          elements.status.textContent = error.message;
        } finally {
          if (!elements.win.classList.contains("show")) {
            setLoading(false);
          }
        }
      }

      elements.form.addEventListener("submit", enviarChute);
      elements.resetButton.addEventListener("click", resetarJogo);
      iniciarJogo();
    </script>
  </body>
</html>
